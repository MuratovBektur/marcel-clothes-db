name: mir-jeans-db_local

services:
  db:
    image: postgres:17-alpine
    container_name: "mir-jeans-db_local_postgres"
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - ${DB_PORT}:5432
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./postgres_data_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  dbgate:
    image: dbgate/dbgate
    container_name: mir-jeans-db_local_dbgate
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
    ports:
      - ${DBGATE_PORT}:3000
    volumes:
      - ./dbgate/local:/root/.dbgate
    environment:
      WEB_ROOT: /dba